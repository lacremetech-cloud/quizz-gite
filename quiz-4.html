  { id:76, cat:'Défis', icon:'⚔️', level:'Difficile', pts:3, isDefi:true, timed:true, timerSec:180, content:"📝 En équipe, écrivez un poème de 6 vers sur la prière.\n\nRègles :\n• Exactement 6 vers\n• Les vers doivent rimer\n• La prière = thème principal\n• 3 minutes\n• Une personne viendra le réciter", response:"Grille d'évaluation (à l'appréciation de l'animatrice) : 6 vers exactement + rimes cohérentes + thème respecté + effort d'écriture + qualité de la récitation. Attribuez le point si les 5 critères sont réunis, sinon aucun point." },
  { id:77, cat:'Défis', icon:'⚔️', level:'Difficile', pts:3, isDefi:true, timed:true, timerSec:300, content:"💰 Fatima possède :\n• 6 800 € sur son compte bancaire\n• 750 € en espèces\n• 2 400 € de bijoux en or destinés à être conservés\n• 3 000 € d'actions (depuis plus d'un an)\n• Une voiture d'une valeur de 18 000 €\n• Une maison dans laquelle elle habite\n• Un ami lui doit 1 200 € qu'il peut rembourser\n• Elle doit rembourser 2 150 € dans quelques semaines\n\nLe seuil de la zakât est atteint. Quel montant de zakât doit-elle payer ?", response:"Réponse : 300 €.\n\nBiens soumis à la zakât : 6 800 + 750 + 2 400 + 3 000 + 1 200 = 14 150 €\n(La voiture d'usage personnel et la maison d'habitation ne sont pas soumises à la zakât.)\n\nOn retire la dette exigible : 14 150 − 2 150 = 12 000 €\n\nZakât = 12 000 × 2,5 % = 300 €" },
  { id:78, cat:'Défis', icon:'⚔️', level:'Difficile', pts:3, isDefi:true, timed:true, timerSec:180, content:"📜 Remettez les 15 événements majeurs de la Sîra dans le bon ordre chronologique :\n\n• Bataille de Hunayn\n• Début de la prédication publique\n• Hégire vers Médine\n• Boycott des Banû Hâshim\n• Première révélation\n• Traité d'Al-Ḥudaybiya\n• Deuxième serment d'Al-ʿAqaba\n• Voyage à Ṭâʾif\n• Bataille du Fossé\n• Conquête de La Mecque\n• Décès de Khadîja (رضي الله عنها)\n• Bataille de Uhud\n• Al-Isrâʾ wal-Miʿrâj\n• Premier serment d'Al-ʿAqaba\n• Bataille de Badr\n\n⏱ 3 minutes.", response:"Ordre chronologique :\n\n1. Première révélation (610 CE)\n2. Début de la prédication publique (~613 CE, 3 ans après)\n3. Boycott des Banû Hâshim (7 → 10 avant l'Hégire)\n4. Décès de Khadîja (رضي الله عنها) — Année de la Tristesse (10 avant H)\n5. Voyage à Ṭâʾif (10 avant H)\n6. Al-Isrâʾ wal-Miʿrâj (10-11 avant H)\n7. Premier serment d'Al-ʿAqaba (12 avant H)\n8. Deuxième serment d'Al-ʿAqaba (13 avant H)\n9. Hégire vers Médine (622 / 1 H)\n10. Bataille de Badr (2 H)\n11. Bataille de Uhud (3 H)\n12. Bataille du Fossé — Al-Khandaq (5 H)\n13. Traité d'Al-Ḥudaybiya (6 H)\n14. Conquête de La Mecque (8 H)\n15. Bataille de Hunayn (8 H, peu après la conquête)" },
  { id:79, cat:'Défis', icon:'⚔️', level:'Difficile', pts:3, isDefi:true, timed:true, timerSec:180, content:"🔤 Les mots de ce hadith authentique ont été mélangés (12 mots). Remettez-les dans le bon ordre :\n\nينظر · إلى · قلوبكم · الله · صوركم · لا · ولكن · وأموالكم · إن · ينظر · وأعمالكم · إلى\n\n(Astuce : le hadith parle du regard d'Allah. Le mot « ينظر » revient deux fois, ainsi que « إلى ».)", response:"Hadith reconstitué (12 mots) :\n\nإنَّ اللهَ لا يَنظُرُ إلى صُوَرِكُم وأموالِكُم ولكن يَنظُرُ إلى قُلوبِكُم وأعمالِكُم\n\n« Certes, Allah ne regarde ni vos apparences ni vos richesses, mais Il regarde vos cœurs et vos œuvres. »\n(Rapporté par Muslim)" },
  { id:80, cat:'Défis', icon:'⚔️', level:'Difficile', pts:3, isDefi:true, timed:true, timerSec:180, content:"🎯 Les Sept Péchés Destructeurs\n\nLe Prophète (ﷺ) a dit : « Évitez les sept péchés destructeurs. » Les Compagnons demandèrent : « Ô Messager d'Allah, quels sont-ils ? »\n\nRetrouvez les 7 péchés destructeurs cités par le Prophète (ﷺ).\n\n⚠️ En cas d'égalité, c'est l'équipe qui les a classés dans l'ordre du hadith qui gagne le défi.\n\n⏱ 3 minutes.", response:"Hadith d'Abû Hurayra (رضي الله عنه) rapporté par Al-Bukhari et Muslim :\n\n« اجْتَنِبُوا السَّبْعَ الْمُوبِقَاتِ »\n\nLes 7 péchés destructeurs, dans l'ordre du hadith :\n\n1. Le shirk (donner des associés à Allah).\n2. La sorcellerie.\n3. Tuer une personne qu'Allah a rendue sacrée, sans droit.\n4. Manger le ribâ (l'usure).\n5. Manger les biens de l'orphelin.\n6. Fuir le champ de bataille.\n7. Accuser de fornication une femme chaste, croyante et innocente." },
  { id:81, cat:'Défis', icon:'⚔️', level:'Difficile', pts:3, isDefi:true, timed:true, timerSec:60, content:"🎯 Les Dix promis au Paradis\n\nLe Prophète (ﷺ) a annoncé à dix Compagnons de son vivant qu'ils faisaient partie des gens du Paradis.\n\nEn 1 minute, retrouvez les 10 Compagnons promis au Paradis (Al-ʿAshara al-Mubashsharûn bil-Jannah).\n\n⏱ 60 secondes.", response:"Les 10 Compagnons promis au Paradis (العشرة المبشرون بالجنة) :\n\n1. Abû Bakr As-Ṣiddîq\n2. ʿUmar ibn Al-Khaṭṭâb\n3. ʿUthmân ibn ʿAffân\n4. ʿAlî ibn Abî Ṭâlib\n5. Ṭalḥa ibn ʿUbaydillâh\n6. Az-Zubayr ibn Al-ʿAwwâm\n7. ʿAbd ar-Raḥmân ibn ʿAwf\n8. Saʿd ibn Abî Waqqâṣ\n9. Saʿîd ibn Zayd\n10. Abû ʿUbayda ibn Al-Jarrâḥ\n\nرضي الله عنهم أجمعين" },
  { id:82, cat:'Défis', icon:'⚔️', level:'Difficile', pts:3, isDefi:true, timed:true, timerSec:60, content:"🎯 Les Ghazawât du Prophète (ﷺ)\n\nLes historiens rapportent que le Prophète (ﷺ) a participé à environ 27 ghazawât (غزوات — expéditions militaires qu'il dirigeait lui-même), même si toutes n'ont pas donné lieu à un combat.\n\nEn 1 minute, citez-en le plus grand nombre possible.\n\n🏆 L'équipe qui en cite le plus remporte le défi.\n\n⏱ 60 secondes.", response:"Les 27 ghazawât les plus communément retenues :\n\n1. Al-Abwâʾ (Waddân)\n2. Buwâṭ\n3. Al-ʿUshayra\n4. Badr al-Ûlâ (Safawân)\n5. Badr al-Kubrâ ⭐\n6. Banû Sulaym (Al-Kudr)\n7. Banû Qaynuqâʿ\n8. As-Sawîq\n9. Dhû Amr (Ghatafân)\n10. Buḥrân\n11. Uhud ⭐\n12. Ḥamrâʾ al-Asad\n13. Banû an-Naḍîr\n14. Dhât ar-Riqâʿ\n15. Badr al-Mawʿid (Badr aṣ-Ṣughrâ)\n16. Dûmat al-Jandal\n17. Al-Khandaq (le Fossé / Al-Aḥzâb) ⭐\n18. Banû Qurayẓa\n19. Banû al-Muṣṭaliq (Al-Muraysîʿ)\n20. Al-Ḥudaybiya\n21. Khaybar ⭐\n22. Fatḥ Makka (Conquête de La Mecque) ⭐\n23. Hunayn ⭐\n24. Aṭ-Ṭâʾif\n25. Tabûk ⭐\n26. Wâdî al-Qurâ\n27. Dhât as-Salâsil (parfois classée parmi les sarâyâ)\n\n⚠️ Les listes classiques varient légèrement selon les ouvrages." },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function activeTeamIndices() {
  return state.teams.map((_, i) => i).filter(i => !state.eliminatedTeams.includes(i));
}

function currentActiveTeamName() {
  if (state.isFinale && state.finalisteIndices) {
    const slot = state.cycleCount % 2;
    return state.teams[state.finalisteIndices[slot]];
  }
  const active = activeTeamIndices();
  if (!active.length) return '';
  return state.teams[active[state.currentTeamIndex % active.length]];
}

      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + t);
      gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.45);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.45);
    });
  } catch(_) {}
}

function triggerVictory() {
  playVictorySound();
  if (typeof confetti === 'function') {
    confetti({ particleCount:120, spread:80, origin:{y:0.6}, colors:['#3E6B4E','#D4AF37','#1F3D2B','#F5F5DC','#ffffff'] });
  }
}

function triggerMegaVictory() {
  playVictorySound();
  if (typeof confetti === 'function') {
    const fire = (opts) => confetti({ particleCount:80, spread:70, origin:{y:0.6}, colors:['#D4AF37','#FFD700','#FFF8DC','#ffffff'], ...opts });
    fire({ angle:60, origin:{x:0,y:0.6} });
    setTimeout(() => fire({ angle:120, origin:{x:1,y:0.6} }), 200);
    setTimeout(() => fire({ angle:90, origin:{x:0.5,y:0.4}, particleCount:200 }), 400);
    setTimeout(() => fire({ angle:60, origin:{x:0,y:0.6} }), 800);
    setTimeout(() => fire({ angle:120, origin:{x:1,y:0.6} }), 1000);
  }
}

function handleNumTeamsChange(val) {

  state.numTeams = n;
  const prev = state.teams;
  state.teams = Array.from({length:n}, (_, i) => prev[i] || `Équipe ${i+1}`);

function renderTeamInputs() {

  wrap.innerHTML = state.teams.map((name, i) => `

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════════════════════
// TOURNAMENT CONTROL
// ═══════════════════════════════════════════════════════════════════════════

function startTournament() {
  if (state.teams.some(t => !t.trim())) return;
  startMusic(); // Démarrer la musique de fond
  state.teamScores = Array(state.numTeams).fill(0);
  state.eliminatedTeams = [];
  state.selectedForElim = null;
  state.finalisteIndices = null;
  state.isFinale = false;
  state.finaleScores = [0, 0];
  state.playedCards = [];
  state.playedDefis = [];
  state.cycleCount = 0;
  state.currentTeamIndex = 0;
  state.unlockedDefi = null;
  const allShuffled = shuffle([...CHALLENGES]);
  state.shuffledChallenges = allShuffled.filter(c => !c.isDefi);
  state.shuffledAllCards = allShuffled;
  state.shuffledFinale = shuffle(FINALE_CHALLENGES);
  state.gameState = 'playing';
  // S'assurer que le mode finale est bien désactivé au démarrage
  document.body.classList.remove('finale-mode');
  document.getElementById('patternBg').classList.remove('gold');

  showScreen('game');
  renderGame();
}

function showScreen(which) {
  document.getElementById('homeScreen').classList.toggle('hidden', which !== 'home');
  document.getElementById('gameScreen').classList.toggle('hidden', which !== 'game');
  document.getElementById('finishedScreen').classList.toggle('hidden', which !== 'finished');
  document.body.classList.toggle('finale-mode', state.isFinale);
  document.getElementById('patternBg').classList.toggle('gold', state.isFinale);
}

function resetGame() {
  stopTimer();
  closeModal(true);
  state.gameState = 'home';
  state.isFinale = false;
  document.body.classList.remove('finale-mode');
  document.getElementById('patternBg').classList.remove('gold');
  showScreen('home');
  renderTeamInputs();
}

function selectTeamForElim(idx) {
  if (state.isFinale) return;
  if (state.eliminatedTeams.includes(idx)) return;
  // Toggle : cliquer à nouveau désélectionne
  state.selectedForElim = (state.selectedForElim === idx) ? null : idx;
  renderGame();
}

function manualEliminate() {
  const remaining = activeTeamIndices();

  if (!NO_FINALE) {
    // Avec exactement 2 équipes restantes (et aucune éliminée), lancer la finale directement
    if (remaining.length === 2 && state.eliminatedTeams.length === 0) {
      state.selectedForElim = null;
      checkFinaleConditionForced();
      return;
    }
    if (remaining.length <= 2) return;
  } else {
    // Quiz 2 : pas de finale — permettre l'élimination jusqu'à 1 équipe restante
    if (remaining.length <= 1) return;
  }

  // Si une équipe est sélectionnée manuellement, l'éliminer
  if (state.selectedForElim !== null && remaining.includes(state.selectedForElim)) {
    state.eliminatedTeams.push(state.selectedForElim);
    state.selectedForElim = null;
    checkFinaleCondition();
    renderGame();
    // Quiz 2 : s'il ne reste qu'une équipe après élimination, on termine la partie
    if (NO_FINALE && activeTeamIndices().length === 1) {
      setTimeout(() => {
        state.gameState = 'finished';
        triggerMegaVictory();
        renderFinished();
        showScreen('finished');
      }, 600);
    }
    return;
  }

  // Aucune équipe sélectionnée : afficher un message d'aide
  const elimStatus = document.getElementById('elimStatus');
  if (elimStatus) {
    elimStatus.textContent = '⚠️ Sélectionnez une équipe à éliminer en cliquant sur sa carte de score.';
    setTimeout(() => { elimStatus.textContent = ''; renderGame(); }, 3000);
  }
}

function checkAllCardsPlayed() {
  if (state.isFinale) return;
  const normalCards = state.shuffledChallenges;
  const allPlayed = normalCards.every(c => state.playedCards.includes(c.id));
  if (!allPlayed) return;

  // Mode Quiz 2 : pas de finale. Le gagnant = équipe avec le score le plus élevé.
  if (NO_FINALE) {
    setTimeout(() => {
      state.gameState = 'finished';
      triggerMegaVictory();
      renderFinished();
      showScreen('finished');
    }, 600);
    return;
  }

  // Sinon : logique classique avec finale (élimination automatique des plus faibles)
  const remaining = activeTeamIndices();
  if (remaining.length <= 2) {
    checkFinaleCondition();
    return;
  }
  const sorted = [...remaining].sort((a, b) => state.teamScores[a] - state.teamScores[b]);
  const toKeep = 2;
  const toElim = sorted.slice(0, sorted.length - toKeep);
  toElim.forEach(i => {
    if (!state.eliminatedTeams.includes(i)) state.eliminatedTeams.push(i);
  });
  checkFinaleCondition();
}

function checkFinaleConditionForced() {
  if (NO_FINALE) return;
  if (state.isFinale) return;
  const remaining = activeTeamIndices();
  if (remaining.length < 2) return;
  const finalistes = remaining.slice(0, 2);
  setTimeout(() => {
    state.finalisteIndices = [finalistes[0], finalistes[1]];
    state.finaleScores = [0, 0];
    state.isFinale = true;
    state.cycleCount = 0;
    state.playedCards = [];
    state.playedDefis = [];
    state.unlockedDefi = null;
    state.shuffledFinale = shuffle(FINALE_CHALLENGES);
    document.body.classList.add('finale-mode');
    document.getElementById('patternBg').classList.add('gold');
    triggerMegaVictory();
    renderGame();
  }, 800);
}

function checkFinaleCondition() {
  if (NO_FINALE) return;
  if (state.isFinale) return;
  const remaining = activeTeamIndices();
  // La finale ne se déclenche automatiquement que si des équipes ont été éliminées
  // (évite le déclenchement immédiat avec seulement 2 équipes au départ)
  if (remaining.length === 2 && state.eliminatedTeams.length > 0) {
    setTimeout(() => {
      state.finalisteIndices = [remaining[0], remaining[1]];
      state.finaleScores = [0, 0];
      state.isFinale = true;
      state.cycleCount = 0;
      state.playedCards = [];
      state.playedDefis = [];
      state.unlockedDefi = null;
      state.shuffledFinale = shuffle(FINALE_CHALLENGES);
      document.body.classList.add('finale-mode');
      document.getElementById('patternBg').classList.add('gold');
      triggerMegaVictory();
      renderGame();
    }, 800);
  }
}

function checkFinaleWin() {
  if (!state.isFinale) return;
  if (state.finaleScores[0] >= 20 || state.finaleScores[1] >= 20) {
    setTimeout(() => {
      state.gameState = 'finished';
      triggerMegaVictory();
      renderFinished();
      showScreen('finished');
    }, 500);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// CARD LOGIC
// ═══════════════════════════════════════════════════════════════════════════

function handleCardClick(id) {
  // En finale, chercher dans TOUTES les cartes de finale (y compris isDefi)
  const cards = state.isFinale ? state.shuffledFinale : state.shuffledChallenges;
  const challenge = cards.find(c => c.id === id);
  if (!challenge) return;
  if (state.playedCards.includes(id)) return;
  if (state.activeChallenge) return;

  // Animate flip
  const cardEl = document.getElementById('card-' + id);
  if (cardEl) {
    const inner = cardEl.querySelector('.card-inner');
    if (inner) {
      inner.classList.add('flipping');
      setTimeout(() => {
        inner.classList.remove('flipping');
        openChallenge(challenge);
      }, 500);
    }
  } else {
    openChallenge(challenge);
  }
}

function handleDefiCardClick(id) {
  if (state.activeChallenge) return;
  // Chercher la carte dans CHALLENGES (phase normale)
  const challenge = CHALLENGES.find(c => c.id === id && c.isDefi);
  if (!challenge) return;
  // Si c'était la carte déverrouillée, on la consomme
  if (state.unlockedDefi && state.unlockedDefi.id === id) {
    state.unlockedDefi = null;
  }
  const cardEl = document.getElementById('card-' + id);
  if (cardEl) {
    const inner = cardEl.querySelector('.card-inner');
    if (inner) {
      inner.classList.add('flipping');
      setTimeout(() => {
        inner.classList.remove('flipping');
        openChallenge(challenge);
      }, 800);
    }
  } else {
    openChallenge(challenge);
  }
}

function openChallenge(challenge) {
  state.activeChallenge = challenge;
  state.showResponse = false;
  state.espiegleTargetSlot = -1;
  // Pause musique pour les récitations Coran
  if (challenge.cat === 'Coran') pauseMusic();
  if (challenge.isExpress) {
    // Mode Défi Express : initialiser la première question
    state.expressStep = 0;
    state.expressAnswered = [];
    state.timerSec = 30;
    state.timerActive = false;
    state.timerStarted = false;
  } else if (challenge.timed) {
    state.timerSec = challenge.timerSec || 60;
    state.timerActive = false;
    state.timerStarted = false;
  }
  renderModal();
  document.getElementById('challengeModal').classList.remove('hidden');
}

function closeModal(force) {
  stopTimer();
  resumeMusic(); // Reprendre la musique quand la modale se ferme
  if (!force && state.activeChallenge) {
    if (state.activeChallenge.isDefi) {
      state.playedDefis.push(state.activeChallenge.id);
      // En finale, avancer le tour après un défi aussi
      if (state.isFinale) advanceTurn();
    } else {
      state.playedCards.push(state.activeChallenge.id);
      advanceTurn();
    }
  }
  state.activeChallenge = null;
  document.getElementById('challengeModal').classList.add('hidden');
  stopAudio();
  renderGame();
}

function addPoints(pts) {
  if (state.isFinale && state.finalisteIndices) {
    const slot = state.cycleCount % 2;
    state.finaleScores[slot] += pts;
  } else {
    const active = activeTeamIndices();
    const idx = active[state.currentTeamIndex % active.length];
    state.teamScores[idx] += pts;
  }
}

function handleAnswer(correct) {
  if (correct && state.activeChallenge) {
    triggerVictory();
    // En finale : 2 pts pour les cartes Culture (non-défi), 3 pts pour les défis
    const ptsToAdd = state.isFinale
      ? (state.activeChallenge.isDefi ? 3 : 2)
      : (state.activeChallenge.pts || 1);
    addPoints(ptsToAdd);
  }
  if (state.activeChallenge) {
    // Les cartes DÉFI (y compris en finale) vont dans playedDefis
    if (state.activeChallenge.isDefi) {
      state.playedDefis.push(state.activeChallenge.id);
    } else {
      state.playedCards.push(state.activeChallenge.id);
    }
  }
  state.activeChallenge = null;
  stopTimer();
  document.getElementById('challengeModal').classList.add('hidden');
  stopAudio();

  if (!state.isFinale) checkAllCardsPlayed();
  checkFinaleWin();
  advanceTurn();
  renderGame();
}
function handleDefiAnswer(slot) {
  triggerVictory();
  if (state.isFinale && state.finalisteIndices) {
    // slot est 0 ou 1 (index dans finalisteIndices)
    state.finaleScores[slot] += 3;
  } else {
    // slot est l'index direct dans state.teams
    state.teamScores[slot] += 3;
  }
  if (state.activeChallenge) state.playedDefis.push(state.activeChallenge.id);
  state.activeChallenge = null;
  stopTimer();
  document.getElementById('challengeModal').classList.add('hidden');
  stopAudio();
   if (!state.isFinale) checkAllCardsPlayed();
  checkFinaleWin();
  renderGame();
}
function handleDefiNoPoint() {
  if (state.activeChallenge) state.playedDefis.push(state.activeChallenge.id);
  state.activeChallenge = null;
  stopTimer();
  document.getElementById('challengeModal').classList.add('hidden');
  stopAudio();
  renderGame();
}

function handleExpressAnswer(slot) {
  // slot: 1 = équipe A, 2 = équipe B, 0 = personne
  const c = state.activeChallenge;
  if (!c || !c.isExpress) return;

  // Attribuer 1 point à l'équipe qui a répondu
  if (slot === 1 || slot === 2) {
    triggerVictory();
    if (state.isFinale && state.finalisteIndices) {
      state.finaleScores[slot - 1] += 1;
    } else {
      const active = activeTeamIndices();
      const teamIdx = slot === 1
        ? (active[0] !== undefined ? active[0] : 0)
        : (active[1] !== undefined ? active[1] : 1);
      state.teamScores[teamIdx] += 1;
    }
  }

  stopTimer();
  state.timerStarted = false;
  state.timerActive = false;

  const total = c.expressQuestions.length;
  const nextStep = state.expressStep + 1;

  if (nextStep < total) {
    // Passer à la question suivante
    state.expressStep = nextStep;
    state.timerSec = 30;
    state.showResponse = false;
    // Mettre à jour la modale sans la fermer
    const fin = state.isFinale;
    const qEl = document.getElementById('modalQuestion');
    const q = c.expressQuestions[nextStep];
    qEl.innerHTML = `<span style="font-size:0.75rem;opacity:0.7;">Question ${nextStep+1} / ${total}</span><br><br>${escHtml(q.q)}`;
    document.getElementById('responseText').textContent = q.r;
    document.getElementById('responseBox').classList.add('hidden');
    document.getElementById('revealBtn').textContent = 'Voir la réponse';
    renderTimerDisplay();
    renderActionBtns();
  } else {
    // Toutes les questions sont passées : fermer la modale
    state.playedDefis.push(c.id);
    state.activeChallenge = null;
    document.getElementById('challengeModal').classList.add('hidden');
    stopAudio();
     if (!state.isFinale) checkAllCardsPlayed();
    checkFinaleWin();
    advanceTurn();
    renderGame();
  }
}
function advanceTurn() {
  if (state.isFinale) {
    state.cycleCount++;
    return;
  }
  const active = activeTeamIndices();
  const newCycle = state.cycleCount + 1;
  if (newCycle >= active.length) {
    state.cycleCount = 0;
    state.currentTeamIndex = 0;
    // Unlock a défi
    const DEFI_CARDS = CHALLENGES.filter(c => c.isDefi);
    const unplayed = DEFI_CARDS.filter(c => !state.playedDefis.includes(c.id));
    if (unplayed.length > 0) {
      const pick = unplayed[Math.floor(Math.random() * unplayed.length)];
      setTimeout(() => {
        state.unlockedDefi = pick;
        renderGame();
      }, 300);
    }
  } else {
    state.cycleCount = newCycle;
    state.currentTeamIndex = (state.currentTeamIndex + 1) % active.length;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════════════════════════

function startTimer() {
  state.timerActive = true;
  state.timerStarted = true;
  state.timerInterval = setInterval(() => {
    if (state.timerSec > 0) {
      state.timerSec--;
      renderTimerDisplay();
    } else {
      stopTimer();
    }
  }, 1000);
  renderTimerDisplay();
}

function stopTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  state.timerActive = false;
}

function stopAudio() {
  const audio = document.getElementById('audioPlayer');
  if (!audio) return;
  // Neutraliser tous les callbacks pour éviter qu'ils relancent la lecture
  audio.oncanplay = null;
  audio.onloadedmetadata = null;
  audio.onplay = null;
  audio.pause();
  audio.currentTime = 0;
  audio.src = '';
  audio.load();
}

function renderTimerDisplay() {
  const wrap = document.getElementById('timerWrap');
  if (!wrap) return;
  const c = state.activeChallenge;
  // Afficher le timer pour les cartes timed ET les cartes Express
  if (!c || (!c.timed && !c.isExpress)) { wrap.innerHTML = ''; return; }
  const isFinale = state.isFinale;
  if (!state.timerStarted) {
    wrap.innerHTML = `<button class="timer-btn ${isFinale ? 'gold' : 'sage'}" onclick="startTimer()">
      ⏱ Démarrer le chronomètre
    </button>`;
  } else {
    const urgent = state.timerSec < 10;
    wrap.innerHTML = `<div class="timer-display ${urgent ? 'urgent' : (isFinale ? 'normal gold-bg' : 'normal')}">
      ⏱ ${state.timerSec}s
    </div>`;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// SHUFFLE
// ═══════════════════════════════════════════════════════════════════════════

function shuffleCards() {
  if (state.isFinale) {
    state.shuffledFinale = shuffle(FINALE_CHALLENGES);
  } else {
    const allShuffled = shuffle([...CHALLENGES]);
    state.shuffledChallenges = allShuffled.filter(c => !c.isDefi);
    state.shuffledAllCards = allShuffled;
  }
  renderCardGrid(true);
}

// ═══════════════════════════════════════════════════════════════════════════

function renderGame() {
  renderHeader();
  renderCardGrid(false);
  updateElimBtn();
}

function renderHeader() {
  const fin = state.isFinale;
  // Finale banner
  const banner = document.getElementById('finaleBanner');
  banner.classList.toggle('hidden', !fin);
  if (fin && state.finalisteIndices) {
    document.getElementById('finaleVs').textContent =
      `${state.teams[state.finalisteIndices[0]]} ⚔️ ${state.teams[state.finalisteIndices[1]]}`;
  }

  // Title
  document.getElementById('headerTitle').className = 'header-title' + (fin ? ' gold' : '');
  document.getElementById('headerSubtitle').className = 'header-subtitle' + (fin ? ' gold' : '');
  document.getElementById('currentTeamName').textContent = currentActiveTeamName();

  // Elim status
  const elimStatus = document.getElementById('elimStatus');
  elimStatus.textContent = '';

  // Scores
  const scoresWrap = document.getElementById('scoresWrap');
  if (fin && state.finalisteIndices) {
    scoresWrap.innerHTML = [0,1].map(slot => {
      const teamIdx = state.finalisteIndices[slot];
      const isActive = state.cycleCount % 2 === slot;
      return `<div class="score-card ${isActive ? 'finale-active' : 'finale-inactive'}">
        <p class="score-label">Finaliste ${slot+1}</p>
        <h2 class="score-name">${escHtml(state.teams[teamIdx])}</h2>
        <p class="score-pts">${state.finaleScores[slot]}</p>
      </div>`;
    }).join('');
  } else {
    scoresWrap.innerHTML = state.teams.map((name, i) => {
      const isElim = state.eliminatedTeams.includes(i);
      const active = activeTeamIndices();
      const isActive = !isElim && active[state.currentTeamIndex % active.length] === i;
      const isSelected = state.selectedForElim === i;
      let cls = isElim ? 'eliminated' : isSelected ? 'selected-for-elim' : isActive ? 'active' : '';
      const onclick = isElim ? '' : `onclick="selectTeamForElim(${i})"`;
      return `<div class="score-card ${cls}" ${onclick} title="${isElim ? 'Éliminée' : 'Cliquer pour sélectionner pour élimination'}">
        ${isElim ? '<p class="score-elim">❌ Éliminée</p>' : ''}
        ${isSelected ? '<p class="score-elim" style="color:var(--red)">🎯 Sélectionnée</p>' : ''}
        <h2 class="score-name">${escHtml(name)}</h2>
        <p class="score-pts">${state.teamScores[i]}</p>
      </div>`;
    }).join('');
  }

  // Leaderboard & shuffle button colors
  const lbBtn = document.getElementById('lbBtn');
  if (lbBtn) lbBtn.className = 'btn btn-sm ' + (fin ? 'btn-outline-gold' : 'btn-outline-gold');
  const shuffleBtn = document.getElementById('shuffleBtn');
  if (shuffleBtn) {
    if (fin) {
      shuffleBtn.className = 'btn btn-sm btn-ghost-gold';
      shuffleBtn.style.color = '';
      shuffleBtn.style.background = 'rgba(194,166,90,0.12)';
      shuffleBtn.style.border = '1px solid rgba(194,166,90,0.35)';
    } else {
      shuffleBtn.className = 'btn btn-sm btn-ghost';
      shuffleBtn.style.color = 'var(--sage)';
      shuffleBtn.style.background = '';
      shuffleBtn.style.border = '';
    }
  }
  // Bouton Recommencer
  const restartBtn = document.querySelector('[onclick="resetGame()"]');
  if (restartBtn) {
    if (fin) {
      restartBtn.style.color = 'rgba(194,166,90,0.75)';
      restartBtn.style.background = 'rgba(194,166,90,0.08)';
      restartBtn.style.border = '1px solid rgba(194,166,90,0.25)';
    } else {
      restartBtn.style.color = 'var(--sage)';
      restartBtn.style.background = '';
      restartBtn.style.border = '';
    }
  }
}

function renderCardGrid(animate) {
  const grid = document.getElementById('cardGrid');
  const fin = state.isFinale;
  const cards = fin ? state.shuffledFinale : state.shuffledChallenges;
  // Grille 3x4 en finale (4 colonnes fixes), sinon grille responsive normale
  if (fin) {
    grid.style.gridTemplateColumns = 'repeat(4, 1fr)';
    grid.style.maxWidth = '700px';
    grid.style.margin = '0 auto';
  } else {
    grid.style.gridTemplateColumns = '';
    grid.style.maxWidth = '';
    grid.style.margin = '';
  }
  const DEFI_CARDS = CHALLENGES.filter(c => c.isDefi);

  // Build all cards to display — toutes les cartes mélangées aléatoirement
  let allCards = fin ? [...cards] : [...state.shuffledAllCards].filter(c => !state.playedCards.includes(c.id) || !state.playedDefis.includes(c.id));
  if (!fin) {
    allCards = [...state.shuffledAllCards];
  }

  grid.innerHTML = allCards.map((challenge, index) => {
    const isDefi = challenge.isDefi;
    // Une carte est jouée si elle est dans playedCards (normales) ou playedDefis (défis)
    const isPlayed = isDefi
      ? state.playedDefis.includes(challenge.id)
      : state.playedCards.includes(challenge.id);
    const isUnlocked = state.unlockedDefi && state.unlockedDefi.id === challenge.id;

    if (isPlayed) {
      return `<div class="card-slot" id="card-${challenge.id}"></div>`;
    }

    if (isDefi) {
      // En finale : les défis sont directement cliquables (pas de système de déverrouillage)
      if (fin) {
        const animStyle = animate ? `animation: deal-in 0.45s ease-out ${index * 0.05}s both;` : '';
        const displayNum = index + 1;
        return `<div class="card-slot" id="card-${challenge.id}" style="${animStyle}">
          <div class="card-inner" onclick="handleCardClick(${challenge.id})">
            <div class="card-face finale-card glow">
              <span class="card-icon">${challenge.icon}</span>
              <span class="card-cat gold">${challenge.cat}</span>
              <p class="card-level gold-text" style="font-size:0.5625rem;">⚔️ Défi</p>
              <div class="card-num gold-bg">${displayNum}</div>
            </div>
          </div>
        </div>`;
      }
      // Hors finale : toujours cliquable (déverrouillé ou non)
      const isNewlyUnlocked = state.newlyUnlockedDefi === challenge.id;
      const faceClass = `card-face defi-${isUnlocked ? 'unlocked' : 'locked'}${isNewlyUnlocked ? ' newly-unlocked' : ''}`;
      return `<div class="card-slot" id="card-${challenge.id}">
        <div class="card-inner" onclick="handleDefiCardClick(${challenge.id})">
          <div class="${faceClass}">
            <span style="font-size:1.25rem;margin-bottom:0.25rem;">${isUnlocked ? '🔓' : '🔒'}</span>
            <span class="card-icon">⚔️</span>
            <span class="card-cat">Défi</span>
            <!-- pas de numéro sur les cartes Défi -->
          </div>
        </div>
        ${isUnlocked ? `<div class="defi-unlock-label" style="position:absolute;bottom:-2rem;left:50%;transform:translateX(-50%);width:max-content;max-width:120px;text-align:center;font-size:0.5rem;color:var(--gold);font-weight:700;line-height:1.3;">✨ Défi disponible !</div>` : ''}
      </div>`;
    }

    // Regular card
    let faceClass = 'card-face ';
    if (fin) {
      faceClass += challenge.level === 'Difficile' ? 'finale-card glow' : 'finale-card';
    } else {
      // Classe par catégorie
      const catKey = challenge.cat ? challenge.cat.toLowerCase() : '';
      if (catKey === 'coran') faceClass += 'cat-coran';
      else if (catKey === 'hadith') faceClass += 'cat-hadith';
      else if (catKey === 'culture') faceClass += 'cat-culture';
      else if (catKey === 'devinettes') faceClass += 'cat-devinettes';
      else if (catKey === 'vocabulaire') faceClass += 'cat-vocabulaire';
      else if (catKey === 'fiqh') faceClass += 'cat-fiqh';
      else if (catKey === 'espiègle') faceClass += 'cat-espiegle';
      else faceClass += 'cat-culture'; // fallback
      // Note : les cartes Espiègle restent visuellement identiques aux autres
      // cartes de leur catégorie. L'effet surprise se joue à l'ouverture du modal.
    }

    const animStyle = animate ? `animation: deal-in 0.45s ease-out ${index * 0.05}s both;` : '';
    const displayNum = fin ? (index + 1) : challenge.id;

    return `<div class="card-slot" id="card-${challenge.id}" style="${animStyle}">
      <div class="card-inner" onclick="handleCardClick(${challenge.id})">
        <div class="${faceClass}">
          <span class="card-icon">${challenge.icon}</span>
          <span class="card-cat ${fin ? 'gold' : ''}">${challenge.cat}</span>
          ${fin
            ? `<p class="card-level gold-text" style="font-size:0.5625rem;">📚 Vocabulaire</p>`
            : `<p class="card-level ${challenge.level === 'Difficile' ? 'difficile-text' : ''}">${challenge.level}</p>`
          }
          <div class="card-num ${fin ? 'gold-bg' : ''}">${displayNum}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateElimBtn() {
  const btn = document.getElementById('elimBtn');
  if (!btn) return;
  const remaining = activeTeamIndices();
  if (state.isFinale) {
    btn.classList.add('hidden');
    return;
  }
  // Quiz 2 : pas de label "Passer en Finale" — juste l'élimination classique
  if (NO_FINALE) {
    if (remaining.length <= 1) {
      btn.classList.add('hidden');
    } else {
      btn.classList.remove('hidden');
      btn.innerHTML = '✖ Éliminer';
      btn.className = 'btn btn-sm btn-danger';
    }
    return;
  }
  // Avec 2 équipes sans élimination : afficher 'Passer en Finale'
  if (remaining.length === 2 && state.eliminatedTeams.length === 0) {
    btn.classList.remove('hidden');
    btn.innerHTML = '🏆 Passer en Finale';
    btn.className = 'btn btn-sm btn-outline-gold';
  } else if (remaining.length <= 2) {
    btn.classList.add('hidden');
  } else {
    btn.classList.remove('hidden');
    btn.innerHTML = '✖ Éliminer';
    btn.className = 'btn btn-sm btn-danger';
  }
}

function renderModal() {
  const c = state.activeChallenge;
  if (!c) return;
  const fin = state.isFinale;

  // Modal box style
  const box = document.getElementById('modalBox');
  box.className = `modal-box ${fin ? 'dark' : 'light'}`;

  // Header
  const header = document.getElementById('modalHeader');
  header.className = `modal-header ${fin ? 'gold' : 'sage'}`;

  const catEl = document.getElementById('modalCat');
  catEl.className = `modal-cat ${fin ? 'dark-text' : ''}`;
  catEl.textContent = `${c.icon} ${c.cat}${fin ? ' — ⭐ FINALE ⭐' : ''}`;

  const levelEl = document.getElementById('modalLevel');
  levelEl.className = `modal-level ${fin ? 'dark-text' : ''}`;
  levelEl.textContent = `Défi Niveau ${c.level}`;

  // Close button color
  const closeBtn = document.getElementById('modalCloseBtn');
  closeBtn.style.color = 'white';

  // Timer
  renderTimerDisplay();

  // Question
  const qEl = document.getElementById('modalQuestion');
  qEl.className = `modal-question ${fin ? 'gold' : ''}`;

  if (c.isExpress && c.expressQuestions) {
    // Mode Défi Express : afficher la question courante
    const step = state.expressStep;
    const total = c.expressQuestions.length;
    const q = c.expressQuestions[step];
    qEl.innerHTML = `<span style="font-size:0.75rem;opacity:0.7;">Question ${step+1} / ${total}</span><br><br>${escHtml(q.q)}`;
  } else {
    qEl.textContent = c.content;
  }

  // Audio
  const audioWrap = document.getElementById('audioWrap');
  if (c.audio) {
    audioWrap.classList.remove('hidden');
    audioWrap.className = `modal-audio ${fin ? 'dark' : 'light'}`;
    document.getElementById('audioIcon').style.color = fin ? 'var(--gold)' : 'var(--sage)';
    document.getElementById('audioLabel').className = `modal-audio-label ${fin ? 'gold' : ''}`;
    const player = document.getElementById('audioPlayer');
    player.src = '';
    player.load();
    player.src = c.audio;
    // Seek robuste : on attend que les métadonnées soient chargées
    player.onloadedmetadata = null;
    player.oncanplay = null;
    player.onloadedmetadata = function() {
      if (c.audioStart && this.duration && c.audioStart < this.duration) {
        this.currentTime = c.audioStart;
      }
    };
    player.oncanplay = function() {
      // Second essai de seek si currentTime n'a pas encore bougé
      if (c.audioStart && this.currentTime < c.audioStart - 1) {
        this.currentTime = c.audioStart;
      }
      this.play().catch(() => {});
    };
  } else {
    audioWrap.classList.add('hidden');
    const player = document.getElementById('audioPlayer');
    player.src = '';
  }

  // Reveal button
  const revealBtn = document.getElementById('revealBtn');
  revealBtn.className = `btn-reveal ${fin ? 'gold' : 'sage'}`;
  revealBtn.textContent = 'Voir la réponse';

  // Response box
  document.getElementById('responseBox').classList.add('hidden');
  document.getElementById('responseBox').className = `modal-response hidden ${fin ? 'dark' : 'light'}`;
  if (c.isExpress && c.expressQuestions) {
    const step = state.expressStep;
    document.getElementById('responseText').textContent = c.expressQuestions[step].r;
  } else {
    document.getElementById('responseText').textContent = c.response;
  }
  state.showResponse = false;

  // Action buttons
  renderActionBtns();

  // Modal overlay
  const overlay = document.getElementById('challengeModal');
  overlay.className = `modal-overlay ${fin ? 'dark-bg' : 'sage-bg'}`;
}

function renderActionBtns() {
  const c = state.activeChallenge;
  if (!c) return;
  const fin = state.isFinale;
  const active = activeTeamIndices();
  const wrap = document.getElementById('actionBtns');

  if (c.isExpress && c.expressQuestions) {
    // Mode Défi Express : boutons Bonne réponse / Mauvaise réponse + navigation
    const step = state.expressStep;
    const total = c.expressQuestions.length;
    const isLast = step >= total - 1;
    const nameA = fin && state.finalisteIndices
      ? state.teams[state.finalisteIndices[0]]
      : (active[0] !== undefined ? state.teams[active[0]] : 'Équipe A');
    const nameB = fin && state.finalisteIndices
      ? state.teams[state.finalisteIndices[1]]
      : (active[1] !== undefined ? state.teams[active[1]] : 'Équipe B');
    wrap.innerHTML = `<div class="modal-defi-actions">
      <p style="text-align:center;font-size:0.75rem;opacity:0.7;margin-bottom:0.5rem;">Qui a répondu correctement ?</p>
      <div class="modal-defi-row">
        <button class="btn ${fin ? 'btn-gold' : 'btn-correct'}" onclick="handleExpressAnswer(1)">
          🏆 ${escHtml(nameA)}
        </button>
        <button class="btn ${fin ? 'btn-correct' : 'btn-gold'}" onclick="handleExpressAnswer(2)">
          🏆 ${escHtml(nameB)}
        </button>
      </div>
      <button class="btn btn-neutral" onclick="handleExpressAnswer(0)">
        ✖ Personne / Passer
      </button>
    </div>`;
  } else if (c.isDefi) {
    if (fin && state.finalisteIndices) {
      // En finale : 2 finalistes seulement
      const nameA = state.teams[state.finalisteIndices[0]];
      const nameB = state.teams[state.finalisteIndices[1]];
      wrap.innerHTML = `<div class="modal-defi-actions">
        <div class="modal-defi-row">
          <button class="btn btn-gold" onclick="handleDefiAnswer(0)">
            🏆 Point pour ${escHtml(nameA)}
          </button>
          <button class="btn btn-correct" onclick="handleDefiAnswer(1)">
            🏆 Point pour ${escHtml(nameB)}
          </button>
        </div>
        <button class="btn btn-neutral" onclick="handleDefiNoPoint()">
          ✖ Aucun point — Match nul
        </button>
      </div>`;
    } else {
      // Phase normale : un bouton par équipe active
      const btnColors = ['btn-correct', 'btn-gold', 'btn-wrong', 'btn-neutral-dark', 'btn-correct', 'btn-gold', 'btn-wrong', 'btn-neutral-dark'];
      const btns = active.map((teamIdx, i) => {
        const color = btnColors[i % btnColors.length];
        return `<button class="btn ${color}" onclick="handleDefiAnswer(${teamIdx})">
          🏆 Point pour ${escHtml(state.teams[teamIdx])}
        </button>`;
      }).join('');
      wrap.innerHTML = `<div class="modal-defi-actions">
        <div class="modal-defi-row" style="flex-wrap:wrap;gap:0.5rem;">
          ${btns}
        </div>
        <button class="btn btn-neutral" onclick="handleDefiNoPoint()">
          ✖ Aucun point — Match nul
        </button>
      </div>`;
    }
  } else if (c.isEspiegle) {
    renderEspiegleBtns(wrap, active);
  } else {
    wrap.innerHTML = `<div class="modal-actions">
      <button class="btn ${fin ? 'btn-correct-gold' : 'btn-correct'}" onclick="handleAnswer(true)">
        ✓ Bonne réponse
      </button>
      <button class="btn btn-wrong" onclick="handleAnswer(false)">
        ✗ Mauvaise réponse
      </button>
    </div>`;
  }
}

function renderEspiegleBtns(wrap, active) {
  // Équipe A = celle qui joue son tour
  const teamA = active[state.currentTeamIndex % active.length];
  const nameA = state.teams[teamA];
  // Phase 1 : pas encore de cible → sélecteur d'équipe (toutes sauf teamA)
  if (state.espiegleTargetSlot === -1) {
    const candidates = active.filter(i => i !== teamA);
    const colors = ['btn-correct', 'btn-gold', 'btn-wrong', 'btn-neutral-dark', 'btn-correct', 'btn-gold', 'btn-wrong'];
    const btns = candidates.map((idx, i) => `
      <button class="btn ${colors[i % colors.length]}" onclick="pickEspiegleTarget(${idx})">
        🎯 ${escHtml(state.teams[idx])}
      </button>`).join('');
    wrap.innerHTML = `<div class="modal-defi-actions">
      <p style="text-align:center;font-size:0.85rem;font-weight:800;color:var(--gold-dark);margin-bottom:0.6rem;">
        🃏 À quelle équipe posez-vous votre question ?
      </p>
      <div class="modal-defi-row" style="flex-wrap:wrap;gap:0.5rem;grid-template-columns:1fr 1fr;">
        ${btns}
      </div>
      <button class="btn btn-neutral" onclick="handleEspiegleCancel()">
        ✖ Passer / Annuler
      </button>
    </div>`;
    return;
  }
  // Phase 2 : cible choisie → boutons juste/faux
  const teamB = state.espiegleTargetSlot;
  const nameB = state.teams[teamB];
  wrap.innerHTML = `<div class="modal-defi-actions">
    <p style="text-align:center;font-size:0.85rem;color:var(--text-dark);margin-bottom:0.6rem;">
      Question posée à <strong style="color:var(--gold-dark);">${escHtml(nameB)}</strong>.
      A-t-elle répondu juste&nbsp;?
    </p>
    <div class="modal-defi-row" style="grid-template-columns:1fr 1fr;gap:0.5rem;">
      <button class="btn btn-correct" onclick="handleEspiegleAnswer(true)">
        ✓ Juste — <strong>${escHtml(nameB)}</strong> vole 1 pt à ${escHtml(nameA)}
      </button>
      <button class="btn btn-wrong" onclick="handleEspiegleAnswer(false)">
        ✗ Faux — <strong>${escHtml(nameA)}</strong> vole 1 pt à ${escHtml(nameB)}
      </button>
    </div>
    <button class="btn btn-neutral" onclick="handleEspiegleCancel()">
      ✖ Passer / Aucun point échangé
    </button>
  </div>`;
}

function pickEspiegleTarget(slot) {
  state.espiegleTargetSlot = slot;
  renderActionBtns();
}

function handleEspiegleAnswer(correctByTarget) {
  const active = activeTeamIndices();
  const teamA = active[state.currentTeamIndex % active.length]; // équipe qui a tiré
  const teamB = state.espiegleTargetSlot;                        // équipe ciblée
  if (teamB >= 0) {
    if (correctByTarget) {
      // B a répondu juste → B vole 1 pt à A
      state.teamScores[teamB] += 1;
      state.teamScores[teamA] -= 1;
    } else {
      // B a répondu faux → A vole 1 pt à B
      state.teamScores[teamA] += 1;
      state.teamScores[teamB] -= 1;
    }
    triggerVictory();
  }
  finishEspiegleTurn();
}

function handleEspiegleCancel() {
  finishEspiegleTurn();
}

function finishEspiegleTurn() {
  if (state.activeChallenge) {
    state.playedCards.push(state.activeChallenge.id);
  }
  state.activeChallenge = null;
  state.espiegleTargetSlot = -1;
  stopTimer();
  document.getElementById('challengeModal').classList.add('hidden');
  stopAudio();
  if (!state.isFinale) checkAllCardsPlayed();
  advanceTurn();
  renderGame();
}

function toggleResponse() {
  state.showResponse = !state.showResponse;
  const box = document.getElementById('responseBox');
  const btn = document.getElementById('revealBtn');
  box.classList.toggle('hidden', !state.showResponse);
  btn.textContent = state.showResponse ? 'Masquer la réponse' : 'Voir la réponse';
}

function showLeaderboard() {
  const fin = state.isFinale;
  const lbBox = document.getElementById('lbBox');
  lbBox.className = `modal-box ${fin ? 'dark' : 'light'}`;
  const lbHeader = document.getElementById('lbHeader');
  lbHeader.className = `modal-header ${fin ? 'gold' : 'sage'}`;
  lbHeader.querySelector('h3').style.color = fin ? 'var(--black)' : 'white';
  lbHeader.querySelector('svg').style.stroke = fin ? 'var(--black)' : 'white';

  const sorted = state.teams
    .map((name, i) => ({ name, score: state.teamScores[i], idx: i }))
    .sort((a, b) => b.score - a.score);

  const medals = ['🥇','🥈','🥉'];
  document.getElementById('lbContent').innerHTML = sorted.map((team, i) => {
    const isElim = state.eliminatedTeams.includes(team.idx);
    const rowClass = isElim ? 'lb-row elim' : i === 0 ? `lb-row ${fin ? 'first-dark' : 'first-light'}` : `lb-row ${fin ? 'other-dark' : 'other-light'}`;
    const rankColor = i === 0 ? 'var(--gold)' : i === 1 ? '#9ca3af' : i === 2 ? '#d97706' : fin ? 'rgba(212,175,55,0.5)' : 'var(--sage)';
    return `<div class="${rowClass}">
      <span class="lb-rank" style="color:${rankColor}">${isElim ? '❌' : medals[i] || '#'+(i+1)}</span>
      <span class="lb-name" style="color:${fin ? 'var(--gold)' : 'var(--sage-dark)'}">${escHtml(team.name)}</span>
      <span class="lb-score" style="color:${fin ? 'var(--gold)' : 'var(--sage)'}">${team.score} pts</span>
    </div>`;
  }).join('');

  document.getElementById('leaderboardModal').classList.remove('hidden');
}

function hideLeaderboard() {
  document.getElementById('leaderboardModal').classList.add('hidden');
}

// FINISHED SCREEN
// ═══════════════════════════════════════════════════════════════════════════

function renderFinished() {
  let winnerName = null;

  if (NO_FINALE || !state.finalisteIndices) {
    // Gagnant = équipe avec le score le plus élevé (hors équipes éliminées)
    const ranking = state.teams.map((name,i) => ({name, score:state.teamScores[i], idx:i}))
      .filter(t => !state.eliminatedTeams.includes(t.idx))
      .sort((a,b) => b.score - a.score);
    const top = ranking[0];
    if (top && (ranking.length === 1 || top.score > ranking[1].score)) {
      winnerName = top.name;
    }
    document.getElementById('finaleScoreBox').innerHTML = '';
  } else {
    const winnerSlot = state.finaleScores[0] >= 20 ? 0 : state.finaleScores[1] >= 20 ? 1
      : state.finaleScores[0] > state.finaleScores[1] ? 0 : state.finaleScores[1] > state.finaleScores[0] ? 1 : -1;
    winnerName = winnerSlot >= 0 ? state.teams[state.finalisteIndices[winnerSlot]] : null;

    document.getElementById('finaleScoreBox').innerHTML = `
      <p class="finished-scores-title">Score de la Finale</p>
      <div class="finished-score-row">
        <span class="finished-score-name">${escHtml(state.teams[state.finalisteIndices[0]])}</span>
        <span class="finished-score-pts">${state.finaleScores[0]}</span>
      </div>
      <div class="finished-score-row">
        <span class="finished-score-name">${escHtml(state.teams[state.finalisteIndices[1]])}</span>
        <span class="finished-score-pts">${state.finaleScores[1]}</span>
      </div>`;
  }

  document.getElementById('winnerName').textContent = winnerName || 'Égalité ! Match nul';

  // General ranking
  const sorted = state.teams.map((name,i) => ({name, score:state.teamScores[i], idx:i})).sort((a,b) => b.score-a.score);
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('rankingBox').innerHTML = `
    <p class="finished-ranking-title">Classement général</p>
    ${sorted.map((t,i) => `<div class="finished-rank-row">
      <span class="finished-rank-medal">${medals[i] || '#'+(i+1)}</span>
      <span class="finished-rank-name">${escHtml(t.name)}</span>
      <span class="finished-rank-pts">${t.score} pts</span>
    </div>`).join('')}`;
}

let musicMuted = false;
let musicStarted = false;

function startMusic() {
  const audio = document.getElementById('bgMusic');
  if (!audio || musicMuted || musicStarted) return;
  audio.volume = 0.35;
  audio.play().then(() => {
    musicStarted = true;
  }).catch(() => {
    // Autoplay bloqué — sera démarré au premier clic
  });
}

function pauseMusic() {
  const audio = document.getElementById('bgMusic');
  if (audio && !audio.paused) audio.pause();
}

function resumeMusic() {
  const audio = document.getElementById('bgMusic');
  if (!audio || musicMuted) return;
  if (audio.paused && musicStarted) audio.play().catch(() => {});
  else if (!musicStarted) startMusic();
}

function toggleMute() {
  musicMuted = !musicMuted;
  const audio = document.getElementById('bgMusic');
  const btn = document.getElementById('muteBtn');
  if (musicMuted) {
    pauseMusic();
    if (btn) btn.textContent = '🔇';
  } else {
    resumeMusic();
    if (btn) btn.textContent = '🔊';
  }
}

// Démarrer la musique au premier clic sur l'écran (contournement autoplay)
document.addEventListener('click', function startOnFirstClick() {
  if (!musicStarted && !musicMuted) startMusic();
}, { once: true });
